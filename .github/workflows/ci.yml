name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - protocol
          - cli
          - daemon
          - relay-go
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache: true

      - name: Go mod verify
        working-directory: ${{ matrix.module }}
        run: go mod verify

      - name: Go build
        working-directory: ${{ matrix.module }}
        run: go build -v ./...

      - name: Go test + coverage
        working-directory: ${{ matrix.module }}
        run: go test -short -v -race -count=1 -timeout=10m -tags external_api -coverprofile=coverage.out ./...

      - name: Upload Go coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ matrix.module }}/coverage.out
          flags: go-${{ matrix.module }}
          fail_ci_if_error: false
          verbose: true

      - name: Upload Go coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-${{ matrix.module }}
          path: ${{ matrix.module }}/coverage.out
          retention-days: 14

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10
          working-directory: ${{ matrix.module }}
          args: --timeout=5m
          only-new-issues: true

  js:
    name: JavaScript / TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint app
        working-directory: app
        run: npx expo lint --max-warnings 0

      - name: Lint app-bridge
        working-directory: app-bridge
        run: npx eslint src/

      - name: Lint packages/highlight
        working-directory: packages/highlight
        run: npx eslint src/

      - name: Typecheck packages/highlight
        working-directory: packages/highlight
        run: npx tsc --noEmit

      - name: Test packages/highlight
        working-directory: packages/highlight
        run: npm test

      - name: Test app (unit) + coverage
        working-directory: app
        run: npm run test -- --coverage --project=unit

      - name: Test app-bridge + coverage
        working-directory: app-bridge
        run: npm test -- --coverage

      - name: Upload JS coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: app/coverage/lcov.info,app-bridge/coverage/lcov.info
          flags: js
          fail_ci_if_error: false
          verbose: true

      - name: Upload JS coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: js-coverage
          path: |
            app/coverage/
            app-bridge/coverage/
            packages/highlight/coverage/
          retention-days: 14

      - name: Build workspace dependencies
        working-directory: app
        run: npm run build:workspace-deps

      - name: Typecheck app
        working-directory: app
        run: npx tsc --noEmit

      - name: Typecheck app-bridge
        working-directory: app-bridge
        run: npx tsc --noEmit
