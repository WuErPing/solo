# NOTE: Render through the workspace-create shell scripts before running when
# using ${SOLO_MAESTRO_*}. Maestro does not substitute environment vars.
appId: ${SOLO_MAESTRO_APP_ID}
---
# Start from an open Android sidebar with ${SOLO_MAESTRO_PROJECT_NAME}
# visible. Ends on the New Workspace screen.

- assertVisible:
    id: "sidebar-project-list"

- assertVisible: ${SOLO_MAESTRO_PROJECT_NAME}

- tapOn: "Create a new workspace for ${SOLO_MAESTRO_PROJECT_NAME}"

- extendedWaitUntil:
    visible: "New workspace"
    timeout: 30000
