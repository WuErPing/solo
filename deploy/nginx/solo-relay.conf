# Solo Relay reverse proxy — terminates TLS and forwards WebSocket traffic.
# Install: /etc/nginx/sites-available/solo-relay.conf -> sites-enabled symlink

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name solo.up2ai.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name solo.up2ai.top;

    ssl_certificate     /etc/letsencrypt/live/solo.up2ai.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/solo.up2ai.top/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket connections are long-lived; disable buffering timeouts.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    location /health {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    location /metrics {
        # Restrict metrics to localhost / internal monitoring only.
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:8080;
    }
}
