<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .title { font-size: 20px; font-weight: 700; fill: #1e293b; }
    .layer-label { font-size: 11px; font-weight: 600; fill: #64748b; text-anchor: end; }
    .group-title { font-size: 11px; font-weight: 600; fill: #475569; }
    .node-label { font-size: 12px; font-weight: 500; fill: #334155; text-anchor: middle; }
    .node-label-sm { font-size: 11px; font-weight: 500; fill: #334155; text-anchor: middle; }
  </style>

  <!-- Background -->
  <rect width="960" height="680" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="38" class="title" text-anchor="middle">Solo System Architecture</text>

  <!-- Client Layer -->
  <rect x="60" y="55" width="840" height="110" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="45" y="115" class="layer-label">Client</text>
  <rect x="200" y="85" width="140" height="55" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="270.0" y="117.5" class="node-label">Web App</text>
  <rect x="410" y="85" width="140" height="55" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="480.0" y="117.5" class="node-label">Mobile App</text>
  <rect x="620" y="85" width="140" height="55" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="690.0" y="117.5" class="node-label">CLI</text>
  <line x1="270.0" y1="140" x2="270.0" y2="170" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="480.0" y1="140" x2="480.0" y2="170" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="690.0" y1="140" x2="690.0" y2="170" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- App-Bridge -->
  <rect x="360" y="175" width="240" height="50" rx="10" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="207" class="node-label" fill="#0369a1">App-Bridge (TypeScript)</text>
  <line x1="480" y1="225" x2="480" y2="245" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Network Layer -->
  <rect x="60" y="250" width="840" height="105" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="45" y="305" class="layer-label">Network</text>
  <rect x="260" y="270" width="160" height="65" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="340.0" y="307.5" class="node-label">Nginx (SSL)</text>
  <rect x="540" y="270" width="160" height="65" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="620.0" y="307.5" class="node-label">Relay Server</text>
  <line x1="420" y1="302" x2="540" y2="302" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="335" x2="620" y2="355" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Daemon Layer -->
  <rect x="60" y="365" width="840" height="300" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="45" y="520" class="layer-label">Daemon</text>
  <text x="480" y="390" class="group-title" text-anchor="middle">Daemon Core Service (Go)</text>
  <rect x="80" y="400" width="400" height="100" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="95" y="418" class="group-title" font-size="10px">WebSocket Server</text>
  <rect x="110" y="435" width="105" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="162.5" y="458.0" class="node-label-sm">Session</text>
  <text x="162.5" y="472.0" class="node-label-sm">Manager</text>
  <rect x="230" y="435" width="105" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="282.5" y="458.0" class="node-label-sm">Terminal</text>
  <text x="282.5" y="472.0" class="node-label-sm">Manager</text>
  <rect x="350" y="435" width="105" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="402.5" y="458.0" class="node-label-sm">Workspace</text>
  <text x="402.5" y="472.0" class="node-label-sm">Manager</text>
  <rect x="500" y="400" width="380" height="100" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="515" y="418" class="group-title" font-size="10px">Agent Manager</text>
  <rect x="515" y="435" width="60" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="545.0" y="464.0" class="node-label-sm">Claude</text>
  <rect x="585" y="435" width="55" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="612.5" y="464.0" class="node-label-sm">Kimi</text>
  <rect x="650" y="435" width="70" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="685.0" y="464.0" class="node-label-sm">OpenCode</text>
  <rect x="730" y="435" width="45" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="752.5" y="464.0" class="node-label-sm">Pi</text>
  <rect x="785" y="435" width="50" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="810.0" y="464.0" class="node-label-sm">Mock</text>
  <rect x="80" y="515" width="800" height="135" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="95" y="533" class="group-title" font-size="10px">Supporting Services</text>
  <rect x="110" y="555" width="105" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="162.5" y="578.0" class="node-label-sm">Session</text>
  <text x="162.5" y="592.0" class="node-label-sm">Memory</text>
  <rect x="230" y="555" width="105" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="282.5" y="578.0" class="node-label-sm">Tmux</text>
  <text x="282.5" y="592.0" class="node-label-sm">Inspector</text>
  <rect x="350" y="555" width="105" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="402.5" y="578.0" class="node-label-sm">Scheduler</text>
  <text x="402.5" y="592.0" class="node-label-sm">(Cron)</text>
  <rect x="470" y="555" width="105" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="522.5" y="578.0" class="node-label-sm">Push</text>
  <text x="522.5" y="592.0" class="node-label-sm">Notifier</text>
  <rect x="590" y="555" width="105" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="642.5" y="578.0" class="node-label-sm">Relay</text>
  <text x="642.5" y="592.0" class="node-label-sm">Client</text>

  <!-- Legend -->
  <rect x="720" y="555" width="145" height="75" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="730" y="575" font-size="11px" font-weight="600" fill="#475569">Legend</text>
  <line x1="730" y1="590" x2="760" y2="590" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="765" y="594" font-size="10px" fill="#64748b">E2EE / WS</text>
  <line x1="730" y1="610" x2="760" y2="610" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="765" y="614" font-size="10px" fill="#64748b">Request flow</text>
</svg>